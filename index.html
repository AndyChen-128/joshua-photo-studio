<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Photo Studio</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=Montserrat:wght@300;400;500&display=swap');

        body {
            font-family: "Montserrat", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            background-image: url('josa281.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: none;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.42);
            z-index: 1;
        }

        .nav {
            position: fixed;
            top: 34px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            gap: 42px;
        }

        .nav a {
            font-family: "Bodoni Moda", Georgia, serif;
            color: rgba(255, 255, 255, 0.82);
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 2px;
            transition: color 0.35s ease, text-shadow 0.35s ease;
        }

        .nav a:hover {
            color: #fff;
            text-shadow: 0 0 16px rgba(255,255,255,0.8);
        }

        .content {
            text-align: center;
            color: #fff;
            position: relative;
            z-index: 2;
            max-width: 80%;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 34px;
            filter: brightness(0) invert(1);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .social-item {
            font-family: "Bodoni Moda", Georgia, serif;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.82);
            font-size: 17px;
            letter-spacing: 1.8px;
            transition: color 0.35s ease, text-shadow 0.35s ease, letter-spacing 0.35s ease;
        }

        .social-item:hover {
            color: #fff;
            letter-spacing: 2.8px;
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.85),
                0 0 20px rgba(210, 230, 255, 0.75),
                0 0 36px rgba(255, 210, 245, 0.55);
        }

        .dream-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%) rotate(var(--angle));
            mix-blend-mode: screen;
            opacity: 0;
            animation: dreamFade 1.45s ease-out forwards;
        }

        .dream-trail::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--length);
            height: var(--height);
            transform: translate(-50%, -50%);
            border-radius: 999px;
            background: linear-gradient(90deg,
                rgba(255,255,255,0) 0%,
                rgba(190,225,255,0.24) 14%,
                rgba(255,255,255,0.95) 34%,
                rgba(255,205,245,0.62) 52%,
                rgba(220,255,245,0.52) 68%,
                rgba(255,245,180,0.38) 82%,
                rgba(255,255,255,0) 100%
            );
            filter: blur(var(--blur));
        }

        @keyframes dreamFade {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--angle)) scale(0.35);
            }

            16% {
                opacity: var(--opacity);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--angle)) scale(1.8);
            }
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }

            .dream-trail {
                display: none;
            }

            .nav {
                top: 28px;
                gap: 22px;
            }

            .nav a {
                font-size: 13px;
                letter-spacing: 1.4px;
            }

            .logo {
                width: 130px;
            }

            .social-links {
                gap: 20px;
            }

            .social-item {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <a href="about.html">ABOUT</a>
        <a href="galleries.html">GALLERIES</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="content">
        <img src="logo.svg" alt="Joshua Photo Studio Logo" class="logo">

        <div class="social-links">
            <a href="https://instagram.com/joshua.photo.studio/" target="_blank" rel="noopener noreferrer" class="social-item">Instagram</a>
            <a href="https://xhslink.com/m/3jYdLtK2ZA2" target="_blank" rel="noopener noreferrer" class="social-item">Rednote</a>
            <a href="mailto:fiworkjoshua@gmail.com?subject=Photography Inquiry" class="social-item">Email</a>
        </div>
    </div>

    <script>
        let lastTrailTime = 0;

        document.addEventListener('mousemove', function(e) {
            const now = Date.now();

            if (now - lastTrailTime > 28) {
                createDreamTrail(e.clientX, e.clientY);
                lastTrailTime = now;
            }
        });

        function createDreamTrail(x, y) {
            const trail = document.createElement('span');
            trail.className = 'dream-trail';

            const angle = -28 + Math.random() * 24;
            const length = 160 + Math.random() * 140;
            const height = 2.5 + Math.random() * 4;
            const blur = 3 + Math.random() * 6;
            const opacity = 0.55 + Math.random() * 0.35;

            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            trail.style.setProperty('--angle', angle + 'deg');
            trail.style.setProperty('--length', length + 'px');
            trail.style.setProperty('--height', height + 'px');
            trail.style.setProperty('--blur', blur + 'px');
            trail.style.setProperty('--opacity', opacity);

            document.body.appendChild(trail);

            setTimeout(function() {
                trail.remove();
            }, 1500);
        }
    </script>

</body>
</html>
