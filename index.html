<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Photo Studio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        /* Logo 样式 */
        .logo {
            width: 120px; /* 如果Logo太大或太小，修改这个数字 */
            height: auto;
            margin-bottom: 30px;
        }

        /* 主图样式 */
        .main-pic {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        /* 社交媒体区域样式 */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-item {
            text-decoration: none;
            color: #666;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .social-item:hover {
            color: #000; /* 鼠标悬停时变成黑色 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.svg" alt="Joshua Photo Studio Logo" class="logo">

        <img src="josa28.jpg" alt="Featured Work" class="main-pic">

        <div class="social-links">
            <a href="https://www.instagram.com/joshua.photo.studio/" target="_blank" class="social-item">Instagram</a>
            <a href="https://www.xiaohongshu.com/user/profile/632ea5c30000000023038f96?xsec_token=ABR3XxIfqZKJaPG0SS8QwankoJWK-riGyr7Jdo4RRy3ok%3D&xsec_source=pc_search" target="_blank" class="social-item">小红书</a>
            <a href="mailto:fiworkjoshua@gmail.com" class="social-item">Email</a>
        </div>
    </div>

</body>
</html>
