<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Photo Studio</title>
    <style>
        /* 这里是一些简单的美化，让页面看起来干净、高级 */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f5f5f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            text-align: center; 
            max-width: 90%; 
        }
        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; /* 给图片加一点点圆角，看起来更现代 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* 加一个淡淡的阴影 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="jo.png" alt="Featured Image">
    </div>

</body>
</html>
