<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Photo Studio | Coming Soon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            background-image: url('josa281.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: none;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.42);
            z-index: 1;
        }

        .content {
            text-align: center;
            color: #fff;
            position: relative;
            z-index: 2;
            max-width: 80%;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
            filter: brightness(0) invert(1);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
        }

        .social-item {
            font-family: "Cormorant Garamond", Georgia, serif !important;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.82);
            font-size: 23px;
            font-weight: 400;
            letter-spacing: 2.8px;
            line-height: 1;
            transition: color 0.35s ease, text-shadow 0.35s ease;
        }

        .social-item:hover {
            color: rgba(255, 255, 255, 1);
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.85),
                0 0 20px rgba(210, 230, 255, 0.75),
                0 0 36px rgba(255, 210, 245, 0.55),
                0 0 52px rgba(255, 240, 190, 0.35);
        }

        .dream-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%) rotate(var(--angle));
            mix-blend-mode: screen;
            opacity: 0;
            animation: dreamFade 1.45s ease-out forwards;
        }

        .dream-trail::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--length);
            height: var(--height);
            transform: translate(-50%, -50%);
            border-radius: 999px;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(190, 225, 255, 0.24) 14%,
                rgba(255, 255, 255, 0.95) 34%,
                rgba(255, 205, 245, 0.62) 52%,
                rgba(220, 255, 245, 0.52) 68%,
                rgba(255, 245, 180, 0.38) 82%,
                rgba(255, 255, 255, 0) 100%
            );
            filter: blur(var(--blur));
        }

        .dream-trail::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: calc(var(--length) * 0.55);
            height: calc(var(--height) * 8);
            transform: translate(-50%, -50%);
            border-radius: 999px;
            background: radial-gradient(
                ellipse,
                rgba(255, 255, 255, 0.45) 0%,
                rgba(210, 230, 255, 0.25) 32%,
                rgba(255, 210, 245, 0.18) 55%,
                rgba(255, 240, 190, 0.1) 68%,
                rgba(255, 255, 255, 0) 78%
            );
            filter: blur(18px);
        }

        @keyframes dreamFade {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--angle)) scale(0.35);
            }

            16% {
                opacity: var(--opacity);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--angle)) scale(1.8);
            }
        }

        .soft-flash {
            position: fixed;
            width: 14px;
            height: 14px;
            pointer-events: none;
            z-index: 9997;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(220, 235, 255, 0.55) 28%,
                rgba(255, 210, 245, 0.35) 52%,
                rgba(255, 240, 190, 0.18) 66%,
                rgba(255, 255, 255, 0) 78%
            );
            mix-blend-mode: screen;
            filter: blur(2px);
            animation: flashFade 0.75s ease-out forwards;
        }

        @keyframes flashFade {
            0% {
                opacity: 0.95;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(10);
            }
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }

            .dream-trail,
            .soft-flash {
                display: none;
            }

            .social-links {
                gap: 20px;
            }

            .social-item {
                font-size: 18px;
                letter-spacing: 2px;
            }

            .logo {
                width: 130px;
            }
        }
    </style>
</head>

<body>

    <div class="content">
        <img src="logo.svg" alt="Joshua Photo Studio Logo" class="logo">

        <div class="social-links">
            <a href="https://instagram.com/joshua.photo.studio/" target="_blank" rel="noopener noreferrer" class="social-item">Instagram</a>
            <a href="https://xhslink.com/m/3jYdLtK2ZA2" target="_blank" rel="noopener noreferrer" class="social-item">Rednote</a>
            <a href="mailto:fiworkjoshua@gmail.com?subject=Photography Inquiry" class="social-item">Email</a>
        </div>
    </div>

    <script>
        let lastTrailTime = 0;

        document.addEventListener('mousemove', function(e) {
            const now = Date.now();

            if (now - lastTrailTime > 28) {
                createDreamTrail(e.clientX, e.clientY);
                lastTrailTime = now;
            }
        });

        document.addEventListener('click', function(e) {
            createSoftFlash(e.clientX, e.clientY);
        });

        function createDreamTrail(x, y) {
            const trail = document.createElement('span');
            trail.className = 'dream-trail';

            const angle = -28 + Math.random() * 24;
            const length = 160 + Math.random() * 140;
            const height = 2.5 + Math.random() * 4;
            const blur = 3 + Math.random() * 6;
            const opacity = 0.55 + Math.random() * 0.35;

            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            trail.style.setProperty('--angle', angle + 'deg');
            trail.style.setProperty('--length', length + 'px');
            trail.style.setProperty('--height', height + 'px');
            trail.style.setProperty('--blur', blur + 'px');
            trail.style.setProperty('--opacity', opacity);

            document.body.appendChild(trail);

            setTimeout(function() {
                trail.remove();
            }, 1500);
        }

        function createSoftFlash(x, y) {
            const flash = document.createElement('span');
            flash.className = 'soft-flash';
            flash.style.left = x + 'px';
            flash.style.top = y + 'px';

            document.body.appendChild(flash);

            setTimeout(function() {
                flash.remove();
            }, 750);
        }
    </script>

</body>
</html>
