<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calleries | Joshua Photo Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #F1F2EF;
            color: #1f1f1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body.no-scroll {
            overflow: hidden;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 34px 0;
            display: flex;
            justify-content: center;
            gap: 42px;
            z-index: 20;
            background: rgba(241, 242, 239, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav a {
            text-decoration: none;
            color: rgba(31, 31, 31, 0.75);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        .nav a:hover {
            color: #1f1f1f;
            letter-spacing: 1.8px;
        }

        .page {
            width: 100%;
            padding: 155px 34px 130px;
        }

        .header {
            max-width: 940px;
            margin: 0 auto 105px;
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            color: rgba(31, 31, 31, 0.45);
            margin-bottom: 26px;
            text-transform: uppercase;
        }

        .page-title {
            margin: 0;
            font-size: 72px;
            font-weight: 300;
            line-height: 1.05;
            letter-spacing: -2px;
        }

        .intro-text {
            margin: 26px auto 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(31, 31, 31, 0.42);
        }

        .archive-grid {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            column-gap: 28px;
            row-gap: 86px;
            align-items: start;
        }

        .archive-item {
            opacity: 0;
            transition: opacity 0.5s ease;
            cursor: pointer;
        }

        .archive-item.loaded {
            opacity: 1;
        }

        .archive-item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .archive-item.left {
            grid-column: 1 / span 5;
        }

        .archive-item.right {
            grid-column: 8 / span 5;
        }

        .archive-item.center {
            grid-column: 4 / span 6;
        }

        .archive-item.wide {
            grid-column: 2 / span 10;
        }

        .archive-item.full {
            grid-column: 1 / -1;
        }

        .archive-item.full img {
            width: 86%;
            margin: 0 auto;
        }

        .archive-item.small-left {
            grid-column: 2 / span 4;
        }

        .archive-item.small-right {
            grid-column: 8 / span 4;
        }

        .archive-item.shift-down {
            margin-top: 72px;
        }

        .archive-item.soft-gap {
            margin-top: 34px;
        }

        /* 全屏图片浏览 */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 15, 15, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-image {
            max-width: 92vw;
            max-height: 88vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .lightbox-close,
        .lightbox-prev,
        .lightbox-next {
            position: fixed;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.78);
            cursor: pointer;
            z-index: 1001;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: color 0.25s ease, opacity 0.25s ease;
        }

        .lightbox-close:hover,
        .lightbox-prev:hover,
        .lightbox-next:hover {
            color: #ffffff;
        }

        .lightbox-close {
            top: 28px;
            right: 34px;
            font-size: 32px;
            line-height: 1;
        }

        .lightbox-prev,
        .lightbox-next {
            top: 50%;
            transform: translateY(-50%);
            font-size: 46px;
            font-weight: 200;
            padding: 24px;
        }

        .lightbox-prev {
            left: 26px;
        }

        .lightbox-next {
            right: 26px;
        }

        .lightbox-counter {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.56);
            font-size: 12px;
            letter-spacing: 1.6px;
            z-index: 1001;
        }

        @media (max-width: 1000px) {
            .page-title {
                font-size: 58px;
            }

            .archive-grid {
                column-gap: 22px;
                row-gap: 62px;
            }

            .archive-item.left {
                grid-column: 1 / span 6;
            }

            .archive-item.right {
                grid-column: 7 / span 6;
            }

            .archive-item.center {
                grid-column: 3 / span 8;
            }

            .archive-item.wide {
                grid-column: 1 / -1;
            }

            .archive-item.full img {
                width: 92%;
            }
        }

        @media (max-width: 768px) {
            .nav {
                gap: 22px;
                padding: 28px 0;
            }

            .nav a {
                font-size: 13px;
                letter-spacing: 0.8px;
            }

            .page {
                padding: 120px 20px 90px;
            }

            .header {
                margin-bottom: 58px;
            }

            .page-title {
                font-size: 46px;
                letter-spacing: -1px;
            }

            .intro-text {
                font-size: 12px;
                letter-spacing: 1.4px;
            }

            .archive-grid {
                display: block;
            }

            .archive-item,
            .archive-item.left,
            .archive-item.right,
            .archive-item.center,
            .archive-item.wide,
            .archive-item.full,
            .archive-item.small-left,
            .archive-item.small-right,
            .archive-item.shift-down,
            .archive-item.soft-gap {
                width: 100%;
                margin: 0 0 30px;
                opacity: 1;
            }

            .archive-item.full img {
                width: 100%;
            }

            .lightbox-image {
                max-width: 92vw;
                max-height: 82vh;
            }

            .lightbox-close {
                top: 22px;
                right: 24px;
                font-size: 30px;
            }

            .lightbox-prev,
            .lightbox-next {
                font-size: 38px;
                padding: 16px;
            }

            .lightbox-prev {
                left: 4px;
            }

            .lightbox-next {
                right: 4px;
            }

            .lightbox-counter {
                bottom: 22px;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main class="page">

        <section class="header">
            <div class="eyebrow">CALLERIES</div>
            <h1 class="page-title">Archive</h1>
            <p class="intro-text">Selected recent work</p>
        </section>

        <section class="archive-grid" id="archiveGrid"></section>

    </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>
        <button class="lightbox-prev" id="lightboxPrev" aria-label="Previous">‹</button>
        <img class="lightbox-image" id="lightboxImage" src="" alt="">
        <button class="lightbox-next" id="lightboxNext" aria-label="Next">›</button>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <script>
        const archiveGrid = document.getElementById('archiveGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');
        const lightboxCounter = document.getElementById('lightboxCounter');

        const maxImages = 120;
        let currentIndex = 0;

        const layoutPattern = [
            'left',
            'right shift-down',
            'wide',
            'small-left',
            'center soft-gap',
            'small-right shift-down',
            'left',
            'right',
            'full',
            'center',
            'left shift-down',
            'right',
            'wide',
            'small-left soft-gap',
            'small-right',
            'full',
            'left',
            'right shift-down'
        ];

        for (let i = 1; i <= maxImages; i++) {
            const item = document.createElement('div');
            const img = document.createElement('img');

            const patternClass = layoutPattern[(i - 1) % layoutPattern.length];

            item.className = 'archive-item ' + patternClass;
            item.dataset.number = i;

            img.src = `images/gallery-${i}.jpg`;
            img.alt = `Gallery image ${i}`;
            img.draggable = false;

            img.onload = function() {
                const ratio = img.naturalWidth / img.naturalHeight;

                if (ratio > 1.28) {
                    item.className = 'archive-item wide';
                }

                if (ratio > 1.75) {
                    item.className = 'archive-item full';
                }

                if (ratio < 0.72 && i % 5 === 0) {
                    item.className = 'archive-item center';
                }

                item.classList.add('loaded');
            };

            img.onerror = function() {
                item.remove();
            };

            item.addEventListener('click', function() {
                openLightboxBySrc(img.src);
            });

            item.appendChild(img);
            archiveGrid.appendChild(item);
        }

        function getLoadedImages() {
            return Array.from(document.querySelectorAll('.archive-item.loaded img'));
        }

        function openLightboxBySrc(src) {
            const images = getLoadedImages();

            currentIndex = images.findIndex(function(img) {
                return img.src === src;
            });

            if (currentIndex < 0) {
                currentIndex = 0;
            }

            updateLightbox();
            lightbox.classList.add('active');
            document.body.classList.add('no-scroll');
        }

        function updateLightbox() {
            const images = getLoadedImages();

            if (images.length === 0) return;

            if (currentIndex < 0) {
                currentIndex = images.length - 1;
            }

            if (currentIndex >= images.length) {
                currentIndex = 0;
            }

            lightboxImage.src = images[currentIndex].src;
            lightboxImage.alt = images[currentIndex].alt;
            lightboxCounter.textContent = String(currentIndex + 1).padStart(2, '0') + ' / ' + String(images.length).padStart(2, '0');
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.classList.remove('no-scroll');
            lightboxImage.src = '';
        }

        function showPrev() {
            currentIndex--;
            updateLightbox();
        }

        function showNext() {
            currentIndex++;
            updateLightbox();
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightboxPrev.addEventListener('click', showPrev);
        lightboxNext.addEventListener('click', showNext);

        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') {
                    closeLightbox();
                }

                if (e.key === 'ArrowLeft') {
                    showPrev();
                }

                if (e.key === 'ArrowRight') {
                    showNext();
                }
            }

            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && e.key.toUpperCase() === 'U') ||
                (e.metaKey && e.altKey && ['I', 'J', 'C'].includes(e.key.toUpperCase()))
            ) {
                e.preventDefault();
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
    </script>

</body>
</html>
