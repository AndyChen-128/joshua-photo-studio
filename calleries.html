<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calleries | Joshua Photo Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #F1F2EF;
            color: #1f1f1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 34px 0;
            display: flex;
            justify-content: center;
            gap: 42px;
            z-index: 20;
            background: rgba(241, 242, 239, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav a {
            text-decoration: none;
            color: rgba(31, 31, 31, 0.75);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        .nav a:hover {
            color: #1f1f1f;
            letter-spacing: 1.8px;
        }

        .page {
            width: 100%;
            padding: 150px 34px 130px;
        }

        .header {
            max-width: 900px;
            margin: 0 auto 96px;
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            color: rgba(31, 31, 31, 0.45);
            margin-bottom: 26px;
            text-transform: uppercase;
        }

        .page-title {
            margin: 0;
            font-size: 72px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
        }

        .intro-text {
            margin: 24px auto 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(31, 31, 31, 0.42);
        }

        .gallery {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-auto-rows: 8px;
            grid-auto-flow: dense;
            column-gap: 38px;
            row-gap: 42px;
            align-items: start;
        }

        .gallery-item {
            width: 100%;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .gallery-item.loaded {
            opacity: 1;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .gallery-item.wide {
            grid-column: 1 / -1;
        }

        .gallery-item.feature {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
        }

        .gallery-item.feature img {
            width: 76%;
        }

        .gallery-item.soft-left img {
            width: 92%;
            margin-right: auto;
        }

        .gallery-item.soft-right img {
            width: 92%;
            margin-left: auto;
        }

        @media (max-width: 1000px) {
            .page-title {
                font-size: 58px;
            }

            .gallery {
                column-gap: 28px;
                row-gap: 34px;
            }

            .gallery-item.feature img {
                width: 84%;
            }
        }

        @media (max-width: 768px) {
            .nav {
                gap: 22px;
                padding: 28px 0;
            }

            .nav a {
                font-size: 13px;
                letter-spacing: 0.8px;
            }

            .page {
                padding: 120px 20px 90px;
            }

            .header {
                margin-bottom: 58px;
            }

            .page-title {
                font-size: 46px;
                letter-spacing: -1px;
            }

            .intro-text {
                font-size: 12px;
                letter-spacing: 1.4px;
            }

            .gallery {
                display: block;
            }

            .gallery-item,
            .gallery-item.wide,
            .gallery-item.feature,
            .gallery-item.soft-left,
            .gallery-item.soft-right {
                width: 100%;
                margin: 0 0 28px;
                opacity: 1;
            }

            .gallery-item.feature img,
            .gallery-item.soft-left img,
            .gallery-item.soft-right img {
                width: 100%;
                margin: 0;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main class="page">

        <section class="header">
            <div class="eyebrow">CALLERIES</div>
            <h1 class="page-title">Selected Work</h1>
            <p class="intro-text">A Visual Journal</p>
        </section>

        <section class="gallery" id="gallery"></section>

    </main>

    <script>
        const gallery = document.getElementById('gallery');
        const maxImages = 60;

        for (let i = 1; i <= maxImages; i++) {
            const item = document.createElement('div');
            const img = document.createElement('img');

            item.className = 'gallery-item';

            img.src = `images/gallery-${i}.jpg`;
            img.alt = `Gallery image ${i}`;
            img.draggable = false;

            if (i % 4 === 1) {
                item.classList.add('soft-left');
            }

            if (i % 4 === 2) {
                item.classList.add('soft-right');
            }

            if ([9, 18, 27, 36, 45, 54].includes(i)) {
                item.classList.add('feature');
                item.classList.remove('soft-left', 'soft-right');
            }

            img.onload = function() {
                const ratio = img.naturalWidth / img.naturalHeight;

                if (ratio > 1.22) {
                    item.classList.add('wide');
                    item.classList.remove('feature', 'soft-left', 'soft-right');
                }

                item.classList.add('loaded');
                resizeGridItem(item);
            };

            img.onerror = function() {
                item.remove();
            };

            item.appendChild(img);
            gallery.appendChild(item);
        }

        function resizeGridItem(item) {
            if (window.innerWidth <= 768) return;

            const rowHeight = parseInt(window.getComputedStyle(gallery).getPropertyValue('grid-auto-rows'));
            const rowGap = parseInt(window.getComputedStyle(gallery).getPropertyValue('row-gap'));
            const img = item.querySelector('img');

            requestAnimationFrame(function() {
                const height = img.getBoundingClientRect().height;
                const rowSpan = Math.ceil((height + rowGap) / (rowHeight + rowGap));
                item.style.gridRowEnd = `span ${rowSpan}`;
            });
        }

        function resizeAllGridItems() {
            const items = document.querySelectorAll('.gallery-item.loaded');

            items.forEach(function(item) {
                resizeGridItem(item);
            });
        }

        window.addEventListener('resize', function() {
            resizeAllGridItems();
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && e.key.toUpperCase() === 'U') ||
                (e.metaKey && e.altKey && ['I', 'J', 'C'].includes(e.key.toUpperCase()))
            ) {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
