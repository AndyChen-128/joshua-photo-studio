<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calleries | Joshua Photo Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #F1F2EF;
            color: #1f1f1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 34px 0;
            display: flex;
            justify-content: center;
            gap: 42px;
            z-index: 20;
            background: rgba(241, 242, 239, 0.78);
            backdrop-filter: blur(12px);
        }

        .nav a {
            text-decoration: none;
            color: rgba(31, 31, 31, 0.75);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        .nav a:hover {
            color: #1f1f1f;
            letter-spacing: 1.8px;
        }

        .page {
            width: 100%;
            padding: 145px 32px 120px;
        }

        .header {
            max-width: 900px;
            margin: 0 auto 95px;
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            color: rgba(31, 31, 31, 0.45);
            margin-bottom: 26px;
            text-transform: uppercase;
        }

        .page-title {
            margin: 0;
            font-size: 72px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
        }

        .intro-text {
            margin: 24px auto 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(31, 31, 31, 0.42);
        }

        .gallery {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            column-gap: 36px;
            row-gap: 48px;
            align-items: start;
        }

        .gallery-item {
            width: 100%;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .gallery-item.small {
            width: 90%;
        }

        .gallery-item.left {
            justify-self: start;
        }

        .gallery-item.right {
            justify-self: end;
        }

        .gallery-item.wide {
            grid-column: span 2;
            width: 88%;
            margin: 14px auto;
        }

        .gallery-item.feature {
            grid-column: span 2;
            width: 72%;
            margin: 22px auto;
        }

        @media (max-width: 900px) {
            .page-title {
                font-size: 58px;
            }

            .gallery {
                column-gap: 26px;
                row-gap: 38px;
            }

            .gallery-item.wide {
                width: 94%;
            }

            .gallery-item.feature {
                width: 84%;
            }
        }

        @media (max-width: 768px) {
            .nav {
                gap: 22px;
                padding: 28px 0;
            }

            .nav a {
                font-size: 13px;
                letter-spacing: 0.8px;
            }

            .page {
                padding: 120px 20px 90px;
            }

            .header {
                margin-bottom: 56px;
            }

            .page-title {
                font-size: 46px;
                letter-spacing: -1px;
            }

            .intro-text {
                font-size: 12px;
                letter-spacing: 1.4px;
            }

            .gallery {
                display: block;
            }

            .gallery-item,
            .gallery-item.small,
            .gallery-item.left,
            .gallery-item.right,
            .gallery-item.wide,
            .gallery-item.feature {
                width: 100%;
                margin: 0 0 28px;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main class="page">

        <section class="header">
            <div class="eyebrow">CALLERIES</div>
            <h1 class="page-title">Selected Work</h1>
            <p class="intro-text">A Visual Journal</p>
        </section>

        <section class="gallery" id="gallery"></section>

    </main>

    <script>
        const gallery = document.getElementById('gallery');

        for (let i = 1; i <= 60; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = `images/gallery-${i}.jpg`;
            img.alt = `Gallery image ${i}`;
            img.draggable = false;

            if (i % 2 === 1) {
                item.classList.add('left');
            } else {
                item.classList.add('right');
            }

            if ([1, 2, 7, 8, 13, 14, 19, 20, 25, 26, 31, 32, 37, 38, 43, 44, 49, 50, 55, 56].includes(i)) {
                item.classList.add('small');
            }

            if ([6, 12, 18, 24, 30, 36, 42, 48, 54, 60].includes(i)) {
                item.classList.add('feature');
                item.classList.remove('small', 'left', 'right');
            }

            img.onload = function() {
                const ratio = img.naturalWidth / img.naturalHeight;

                if (ratio > 1.25) {
                    item.classList.add('wide');
                    item.classList.remove('small', 'left', 'right', 'feature');
                }
            };

            img.onerror = function() {
                item.remove();
            };

            item.appendChild(img);
            gallery.appendChild(item);
        }

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && e.key.toUpperCase() === 'U') ||
                (e.metaKey && e.altKey && ['I', 'J', 'C'].includes(e.key.toUpperCase()))
            ) {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
