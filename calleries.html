<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calleries | Joshua Photo Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #F1F2EF;
            color: #1f1f1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 34px 0;
            display: flex;
            justify-content: center;
            gap: 42px;
            z-index: 20;
            background: rgba(241, 242, 239, 0.72);
            backdrop-filter: blur(12px);
        }

        .nav a {
            text-decoration: none;
            color: rgba(31, 31, 31, 0.75);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        .nav a:hover {
            color: #1f1f1f;
            letter-spacing: 1.8px;
        }

        .page {
            width: 100%;
            padding: 145px 32px 120px;
        }

        .header {
            max-width: 900px;
            margin: 0 auto 95px;
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            color: rgba(31, 31, 31, 0.45);
            margin-bottom: 26px;
            text-transform: uppercase;
        }

        .page-title {
            margin: 0;
            font-size: 72px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
        }

        .intro-text {
            margin: 24px auto 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(31, 31, 31, 0.42);
        }

        .gallery {
            max-width: 1260px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            column-gap: 34px;
            row-gap: 58px;
            align-items: start;
        }

        .gallery-item {
            width: 100%;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .gallery-item.wide {
            grid-column: span 2;
            width: 82%;
            margin: 18px auto 10px;
        }

        .gallery-item.narrow-left {
            width: 84%;
            justify-self: start;
        }

        .gallery-item.narrow-right {
            width: 84%;
            justify-self: end;
        }

        .gallery-item.offset-small {
            margin-top: 42px;
        }

        .gallery-item.offset-large {
            margin-top: 86px;
        }

        .gallery-item.feature {
            grid-column: span 2;
            width: 68%;
            margin: 28px auto 18px;
        }

        .image-number {
            margin-top: 10px;
            font-size: 11px;
            letter-spacing: 1.8px;
            color: rgba(31, 31, 31, 0.36);
        }

        @media (max-width: 900px) {
            .page-title {
                font-size: 58px;
            }

            .gallery {
                column-gap: 24px;
                row-gap: 46px;
            }

            .gallery-item.wide {
                width: 90%;
            }

            .gallery-item.feature {
                width: 82%;
            }
        }

        @media (max-width: 768px) {
            .nav {
                gap: 22px;
                padding: 28px 0;
            }

            .nav a {
                font-size: 13px;
                letter-spacing: 0.8px;
            }

            .page {
                padding: 120px 20px 90px;
            }

            .header {
                margin-bottom: 56px;
            }

            .page-title {
                font-size: 46px;
                letter-spacing: -1px;
            }

            .intro-text {
                font-size: 12px;
                letter-spacing: 1.4px;
            }

            .gallery {
                display: block;
            }

            .gallery-item,
            .gallery-item.wide,
            .gallery-item.feature,
            .gallery-item.narrow-left,
            .gallery-item.narrow-right,
            .gallery-item.offset-small,
            .gallery-item.offset-large {
                width: 100%;
                margin: 0 0 28px;
            }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main class="page">

        <section class="header">
            <div class="eyebrow">CALLERIES</div>
            <h1 class="page-title">Selected Work</h1>
            <p class="intro-text">A Visual Journal</p>
        </section>

        <section class="gallery">
            <div class="gallery-item narrow-left">
                <img src="images/gallery-1.jpg" alt="Gallery image 1">
                <div class="image-number">01</div>
            </div>

            <div class="gallery-item narrow-right offset-small">
                <img src="images/gallery-2.jpg" alt="Gallery image 2">
                <div class="image-number">02</div>
            </div>

            <div class="gallery-item wide">
                <img src="images/gallery-3.jpg" alt="Gallery image 3">
                <div class="image-number">03</div>
            </div>

            <div class="gallery-item offset-small">
                <img src="images/gallery-4.jpg" alt="Gallery image 4">
                <div class="image-number">04</div>
            </div>

            <div class="gallery-item offset-large">
                <img src="images/gallery-5.jpg" alt="Gallery image 5">
                <div class="image-number">05</div>
            </div>

            <div class="gallery-item narrow-left">
                <img src="images/gallery-6.jpg" alt="Gallery image 6">
                <div class="image-number">06</div>
            </div>

            <div class="gallery-item narrow-right offset-small">
                <img src="images/gallery-7.jpg" alt="Gallery image 7">
                <div class="image-number">07</div>
            </div>

            <div class="gallery-item feature">
                <img src="images/gallery-8.jpg" alt="Gallery image 8">
                <div class="image-number">08</div>
            </div>

            <div class="gallery-item offset-large">
                <img src="images/gallery-9.jpg" alt="Gallery image 9">
                <div class="image-number">09</div>
            </div>

            <div class="gallery-item">
                <img src="images/gallery-10.jpg" alt="Gallery image 10">
                <div class="image-number">10</div>
            </div>

            <div class="gallery-item wide">
                <img src="images/gallery-11.jpg" alt="Gallery image 11">
                <div class="image-number">11</div>
            </div>

            <div class="gallery-item narrow-left offset-small">
                <img src="images/gallery-12.jpg" alt="Gallery image 12">
                <div class="image-number">12</div>
            </div>

            <div class="gallery-item narrow-right">
                <img src="images/gallery-13.jpg" alt="Gallery image 13">
                <div class="image-number">13</div>
            </div>

            <div class="gallery-item">
                <img src="images/gallery-14.jpg" alt="Gallery image 14">
                <div class="image-number">14</div>
            </div>

            <div class="gallery-item offset-large">
                <img src="images/gallery-15.jpg" alt="Gallery image 15">
                <div class="image-number">15</div>
            </div>

            <div class="gallery-item feature">
                <img src="images/gallery-16.jpg" alt="Gallery image 16">
                <div class="image-number">16</div>
            </div>

            <div class="gallery-item narrow-left">
                <img src="images/gallery-17.jpg" alt="Gallery image 17">
                <div class="image-number">17</div>
            </div>

            <div class="gallery-item narrow-right offset-small">
                <img src="images/gallery-18.jpg" alt="Gallery image 18">
                <div class="image-number">18</div>
            </div>

            <div class="gallery-item wide">
                <img src="images/gallery-19.jpg" alt="Gallery image 19">
                <div class="image-number">19</div>
            </div>

            <div class="gallery-item offset-large">
                <img src="images/gallery-20.jpg" alt="Gallery image 20">
                <div class="image-number">20</div>
            </div>

            <div class="gallery-item">
                <img src="images/gallery-21.jpg" alt="Gallery image 21">
                <div class="image-number">21</div>
            </div>

            <div class="gallery-item feature">
                <img src="images/gallery-22.jpg" alt="Gallery image 22">
                <div class="image-number">22</div>
            </div>

            <div class="gallery-item narrow-left offset-small">
                <img src="images/gallery-23.jpg" alt="Gallery image 23">
                <div class="image-number">23</div>
            </div>

            <div class="gallery-item narrow-right">
                <img src="images/gallery-24.jpg" alt="Gallery image 24">
                <div class="image-number">24</div>
            </div>

            <div class="gallery-item wide">
                <img src="images/gallery-25.jpg" alt="Gallery image 25">
                <div class="image-number">25</div>
            </div>
        </section>

    </main>

    <script>
        const images = document.querySelectorAll('.gallery-item img');

        images.forEach(function(img) {
            img.addEventListener('load', function() {
                const item = img.closest('.gallery-item');
                const ratio = img.naturalWidth / img.naturalHeight;

                if (ratio > 1.25) {
                    item.classList.add('wide');
                    item.classList.remove('narrow-left', 'narrow-right', 'offset-small', 'offset-large');
                }
            });
        });
    </script>

</body>
</html>
