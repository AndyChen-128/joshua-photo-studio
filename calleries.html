<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calleries | Joshua Photo Studio</title>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #F1F2EF;
            color: #1f1f1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 34px 0;
            display: flex;
            justify-content: center;
            gap: 42px;
            z-index: 20;
            background: rgba(241, 242, 239, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav a {
            text-decoration: none;
            color: rgba(31, 31, 31, 0.75);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        .nav a:hover {
            color: #1f1f1f;
            letter-spacing: 1.8px;
        }

        .page {
            width: 100%;
            padding: 155px 34px 130px;
        }

        .header {
            max-width: 940px;
            margin: 0 auto 105px;
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            color: rgba(31, 31, 31, 0.45);
            margin-bottom: 26px;
            text-transform: uppercase;
        }

        .page-title {
            margin: 0;
            font-size: 72px;
            font-weight: 300;
            line-height: 1.05;
            letter-spacing: -2px;
        }

        .intro-text {
            margin: 26px auto 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(31, 31, 31, 0.42);
        }

        .archive-grid {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            column-gap: 28px;
            row-gap: 86px;
            align-items: start;
        }

        .archive-item {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .archive-item.loaded {
            opacity: 1;
        }

        .archive-item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .archive-item.left {
            grid-column: 1 / span 5;
        }

        .archive-item.right {
            grid-column: 8 / span 5;
        }

        .archive-item.center {
            grid-column: 4 / span 6;
        }

        .archive-item.wide {
            grid-column: 2 / span 10;
        }

        .archive-item.full {
            grid-column: 1 / -1;
        }

        .archive-item.full img {
            width: 86%;
            margin: 0 auto;
        }

        .archive-item.small-left {
            grid-column: 2 / span 4;
        }

        .archive-item.small-right {
            grid-column: 8 / span 4;
        }

        .archive-item.shift-down {
            margin-top: 72px;
        }

        .archive-item.soft-gap {
            margin-top: 34px;
        }

        @media (max-width: 1000px) {
            .page-title {
                font-size: 58px;
            }

            .archive-grid {
                column-gap: 22px;
                row-gap: 62px;
            }

            .archive-item.left {
                grid-column: 1 / span 6;
            }

            .archive-item.right {
                grid-column: 7 / span 6;
            }

            .archive-item.center {
                grid-column: 3 / span 8;
            }

            .archive-item.wide {
                grid-column: 1 / -1;
            }

            .archive-item.full img {
                width: 92%;
            }
        }

        @media (max-width: 768px) {
            .nav {
                gap: 22px;
                padding: 28px 0;
            }

            .nav a {
                font-size: 13px;
                letter-spacing: 0.8px;
            }

            .page {
                padding: 120px 20px 90px;
            }

            .header {
                margin-bottom: 58px;
            }

            .page-title {
                font-size: 46px;
                letter-spacing: -1px;
            }

            .intro-text {
                font-size: 12px;
                letter-spacing: 1.4px;
            }

            .archive-grid {
                display: block;
            }

            .archive-item,
            .archive-item.left,
            .archive-item.right,
            .archive-item.center,
            .archive-item.wide,
            .archive-item.full,
            .archive-item.small-left,
            .archive-item.small-right,
            .archive-item.shift-down,
            .archive-item.soft-gap {
                width: 100%;
                margin: 0 0 30px;
                opacity: 1;
            }

            .archive-item.full img {
                width: 100%;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main class="page">

        <section class="header">
            <div class="eyebrow">CALLERIES</div>
            <h1 class="page-title">Archive</h1>
            <p class="intro-text">Selected recent work</p>
        </section>

        <section class="archive-grid" id="archiveGrid"></section>

    </main>

    <script>
        const archiveGrid = document.getElementById('archiveGrid');
        const maxImages = 120;

        const layoutPattern = [
            'left',
            'right shift-down',
            'wide',
            'small-left',
            'center soft-gap',
            'small-right shift-down',
            'left',
            'right',
            'full',
            'center',
            'left shift-down',
            'right',
            'wide',
            'small-left soft-gap',
            'small-right',
            'full',
            'left',
            'right shift-down'
        ];

        for (let i = 1; i <= maxImages; i++) {
            const item = document.createElement('div');
            const img = document.createElement('img');

            const patternClass = layoutPattern[(i - 1) % layoutPattern.length];

            item.className = 'archive-item ' + patternClass;

            img.src = `images/gallery-${i}.jpg`;
            img.alt = `Gallery image ${i}`;
            img.draggable = false;

            img.onload = function() {
                const ratio = img.naturalWidth / img.naturalHeight;

                if (ratio > 1.28) {
                    item.className = 'archive-item wide';
                }

                if (ratio > 1.75) {
                    item.className = 'archive-item full';
                }

                if (ratio < 0.72 && i % 5 === 0) {
                    item.className = 'archive-item center';
                }

                item.classList.add('loaded');
            };

            img.onerror = function() {
                item.remove();
            };

            item.appendChild(img);
            archiveGrid.appendChild(item);
        }

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && e.key.toUpperCase() === 'U') ||
                (e.metaKey && e.altKey && ['I', 'J', 'C'].includes(e.key.toUpperCase()))
            ) {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
